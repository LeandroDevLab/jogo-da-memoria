<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/styles/reset.css" />
    <link rel="stylesheet" href="./src/styles/main.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <title>Jogo da memória</title>
  </head>
  <body>
    <header>
      <button class="historico-button" onclick="openHistorico()">
        Histórico
      </button>
      <h3>Desenvolvido por Leandro Oliota</h3>
    </header>
    <div class="historico">
      <h3>Histórico de Partidas</h3>
      <p>em breve!</p>
    </div>
    <div class="container">
      <h2>JOGO DA MEMÓRIA</h2>
      <button class="button start" onclick="startCountdown()">
        Iniciar partida!
      </button>
      <div class="container2">
        <h5>Tempo: <span id="time">0</span></h5>
        <h5>Erros: <span id="score">0</span></h5>
      </div>
      <div class="game"></div>
      <button class="button reset" onclick="window.location.reload()">
        resetar o jogo
      </button>
    </div>
    <footer class="contato">
      <div class="redes">
        <a
          href="https://github.com/LeandroDevLab"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i class="fa-brands fa-github"></i>
        </a>
        <a
          href="http://linkedin.com/in/leandrosoribeiro"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i class="fa-brands fa-linkedin"></i>
        </a>
        <a
          href="https://wa.me/5583996157815?text=Ol%C3%A1%20Leandro%20Oliota%2C%20estou%20entrando%20em%20contato%20atrav%C3%A9s%20de%20um%20projeto%20que%20achei%20interessante%21"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i class="fa-brands fa-square-whatsapp"></i>
        </a>
      </div>
      <p>Leandro Oliota</p>
    </footer>
    <script src="./src/scripts/engine.js" defer></script>
  </body>
</html>
